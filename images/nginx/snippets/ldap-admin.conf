# Official 389 Directory Server Cockpit console, reverse-proxied at
# ldap-admin.<base>. Cockpit runs login-less (local-session) inside the ldap
# container, so ALL access control lives here: TLS (the enclosing server) + HTTP
# Basic auth (htpasswd rendered from COCKPIT_ADMIN_PASSWORD). Optionally also
# restrict by source IP. Never expose this vhost without auth.
auth_basic "389 Directory Console";
auth_basic_user_file /etc/nginx/ldap-admin.htpasswd;
# Uncomment + set to lock the console to admin networks:
# allow 10.0.0.0/8;
# deny all;

location / {
    proxy_pass http://ldap:9090;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Cockpit is a long-lived WebSocket app.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    gzip off;
}
