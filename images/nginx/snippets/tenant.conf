# Tenant SPA + same-origin APIs (included by the per-tenant <tenant>.<base> server).
# The Host header is passed through so the bridges/CSAI/MCP resolve the tenant
# from the subdomain.
root /usr/share/nginx/html;

# REST bridge (auth, files, streaming up/down + range).
location /api/ {
    proxy_pass http://http-bridge:8090/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;   # stream uploads straight through
    proxy_buffering off;           # stream / range downloads straight through
}

# CSAI (search, document text/preview, RAG chat WebSocket).
location /csai/ {
    proxy_pass http://csai-app:8092/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;   # WebSocket /csai/chat
    proxy_buffering off;
}

# MCP: the Streamable-HTTP endpoint at /mcp; helper routes (/auth/token,
# /whoami) under /mcp/. Host passed through for subdomain tenant resolution.
location = /mcp { proxy_pass http://mcp:8089/mcp; proxy_set_header Host $host; }
location /mcp/  { proxy_pass http://mcp:8089/;    proxy_set_header Host $host; }

# SPA (history-mode fallback).
location / { try_files $uri $uri/ /index.html; }
