# WebDAV proxy (included by the <tenant>-drive.<base> server). The webdav-bridge
# derives the tenant from the Host (first '-'-delimited label segment).
location / {
    proxy_pass http://webdav-bridge:8088;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering off;
}
