# Unified FileEngine stack.
#
# Phase 2 brings up the data layer — Postgres (pgvector) + Redis — the one-shot
# db-init, and the core gRPC service to verify it boots against them. Later
# phases append the bridges, CSAI, MCP, and nginx.
#
# The object store is EXTERNAL S3 (S3_* in .env). For local testing without an
# external bucket, add the test override (provides a MinIO):
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up
#
# Only nginx (a later phase) publishes host ports; the data services and the core
# stay internal to the compose network. Config is the operator .env, mapped to
# per-service environment below.

name: fileengine

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${CORE_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # One-shot: create the CSAI database + DB-wide extensions (idempotent). The
  # core DB is created by the postgres image; the core/CSAI provision their own
  # per-tenant schemas on demand.
  db-init:
    image: pgvector/pgvector:pg16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CORE_DB: ${CORE_DB}
      CSAI_DB: ${CSAI_DB}
    volumes:
      - ./init/db-init.sh:/db-init.sh:ro,Z
      - ./init/migrations:/migrations:ro,Z
    entrypoint: ["bash", "/db-init.sh"]
    restart: "no"

  # 389 Directory Server — authentication + tenant/role groups. Internal only
  # (LDAP 3389, LDAPS 3636). Console (Cockpit) can be enabled separately.
  ldap:
    image: 389ds/dirsrv:latest
    environment:
      DS_DM_PASSWORD: ${LDAP_BIND_PASSWORD}
      DS_SUFFIX_NAME: ${LDAP_DOMAIN}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
    volumes:
      - ldapdata:/data
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -H ldap://localhost:3389 -x -D 'cn=Directory Manager' -w \"$$LDAP_BIND_PASSWORD\" -b cn=config -s base dn >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  # One-shot: create the suffix backend + seed the DIT (ou=users, ou=tenants,
  # default tenant role groups, initial admin). Idempotent.
  ldap-init:
    image: 389ds/dirsrv:latest
    depends_on:
      ldap:
        condition: service_healthy
    environment:
      LDAP_URI: ldap://ldap:3389
      LDAP_SUFFIX: ${LDAP_DOMAIN}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-cn=Directory Manager}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      DEFAULT_TENANT: ${DEFAULT_TENANT:-default}
      LDAP_ADMIN_EMAIL: ${LDAP_ADMIN_EMAIL}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
    volumes:
      - ./init/ldap-seed.sh:/ldap-seed.sh:ro,Z
    entrypoint: ["bash", "/ldap-seed.sh"]
    restart: "no"

  core:
    image: fileengine-core:${VERSION:-1.1.0}
    build:
      context: .
      dockerfile: images/core/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      # --- Database ---
      FILEENGINE_PG_HOST: postgres
      FILEENGINE_PG_PORT: "5432"
      FILEENGINE_PG_DATABASE: ${CORE_DB}
      FILEENGINE_PG_USER: ${POSTGRES_USER}
      FILEENGINE_PG_PASSWORD: ${POSTGRES_PASSWORD}
      # --- Local storage / cache tier ---
      FILEENGINE_STORAGE_BASE: /var/lib/fileengine/storage
      # --- At-rest crypto ---
      FILEENGINE_ENCRYPT_DATA: ${FILEENGINE_ENCRYPT_DATA:-true}
      FILEENGINE_COMPRESS_DATA: ${FILEENGINE_COMPRESS_DATA:-true}
      AT_REST_KEY: ${AT_REST_KEY}
      # --- Object store (external S3; overridden to MinIO by the test override) ---
      FILEENGINE_S3_ENDPOINT: ${S3_ENDPOINT}
      FILEENGINE_S3_REGION: ${S3_REGION}
      FILEENGINE_S3_BUCKET: ${S3_BUCKET}
      FILEENGINE_S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      FILEENGINE_S3_SECRET_KEY: ${S3_SECRET_KEY}
      FILEENGINE_S3_PATH_STYLE: ${S3_PATH_STYLE:-true}
      FILEENGINE_S3_SYNC_SUPPORT: ${S3_SYNC_SUPPORT:-aws}
      # --- Redis events (the packaged core is built with events ON) ---
      FILEENGINE_EVENTS_ENABLED: "true"
      FILEENGINE_REDIS_HOST: redis
      FILEENGINE_REDIS_PORT: "6379"
      FILEENGINE_REDIS_PASSWORD: ${REDIS_PASSWORD}
      FILEENGINE_EVENTS_STREAM: ${EVENTS_STREAM:-fileengine:events}
    volumes:
      - filecache:/var/lib/fileengine/storage
    healthcheck:
      # The metrics listener (:8081) comes up once the core is serving. No curl in
      # the image, so probe the TCP port with bash.
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/8081' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    restart: unless-stopped

  # REST/auth proxy over the gRPC core (serves the SPA's /api). Internal only;
  # nginx (a later phase) terminates TLS and reverse-proxies to it.
  http-bridge:
    image: fileengine-http-bridge:${VERSION:-1.1.0}
    build:
      context: .
      dockerfile: images/http-bridge/Dockerfile
    depends_on:
      core:
        condition: service_healthy
      ldap-init:
        condition: service_completed_successfully
    environment:
      FILEENGINE_GRPC_HOST: core
      FILEENGINE_GRPC_PORT: "50051"
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8090"
      HTTP_MONITORING_PORT: "8091"
      HTTP_CORS_ORIGIN: ${HTTP_CORS_ORIGIN:-}
      HTTP_MAX_BODY_BYTES: ${HTTP_MAX_BODY_BYTES:-104857600}
      LOG_WRITE_TO_CONSOLE: "true"
      # LDAP is contacted per-login; the bridge starts even before LDAP is up
      # (Phase 4). /readyz probes the core via gRPC and needs no LDAP.
      FILEENGINE_LDAP_ENDPOINT: ${LDAP_ENDPOINT:-ldap://ldap:3389}
      FILEENGINE_LDAP_DOMAIN: ${LDAP_DOMAIN:-}
      FILEENGINE_LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      FILEENGINE_LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      FILEENGINE_LDAP_TENANT_BASE: ${LDAP_TENANT_BASE:-}
      FILEENGINE_LDAP_USER_BASE: ${LDAP_USER_BASE:-}
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/8090' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  # WebDAV gateway over the gRPC core. Internal only; nginx routes the
  # <tenant>-drive.<base> vhost here.
  webdav-bridge:
    image: fileengine-webdav-bridge:${VERSION:-1.1.0}
    build:
      context: .
      dockerfile: images/webdav-bridge/Dockerfile
    depends_on:
      core:
        condition: service_healthy
      ldap-init:
        condition: service_completed_successfully
    environment:
      FILEENGINE_GRPC_HOST: core
      FILEENGINE_GRPC_PORT: "50051"
      WEBDAV_HOST: 0.0.0.0
      WEBDAV_PORT: "8088"
      WEBDAV_MONITORING_PORT: "8089"
      LOG_WRITE_TO_CONSOLE: "true"
      FILEENGINE_LDAP_ENDPOINT: ${LDAP_ENDPOINT:-ldap://ldap:3389}
      FILEENGINE_LDAP_DOMAIN: ${LDAP_DOMAIN:-}
      FILEENGINE_LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      FILEENGINE_LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      FILEENGINE_LDAP_TENANT_BASE: ${LDAP_TENANT_BASE:-}
      FILEENGINE_LDAP_USER_BASE: ${LDAP_USER_BASE:-}
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/8088' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  # Bundled local AI (CPU) — serves the embedding model for CSAI.
  ollama:
    image: ollama/ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # One-shot: pull the embedding model on first startup (idempotent — Ollama
  # no-ops if it's already in the persisted volume).
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      CSAI_EMBEDDING_MODEL: ${CSAI_EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint:
      - /bin/sh
      - -c
      - 'ollama pull "$$CSAI_EMBEDDING_MODEL" && echo "model $$CSAI_EMBEDDING_MODEL ready"'
    restart: "no"

  # CSAI HTTP app — search, RAG chat, document text/preview (serves the SPA /csai).
  csai-app:
    image: fileengine-csai:${VERSION:-1.1.0}
    build:
      context: images/csai
      dockerfile: Dockerfile
      args:
        INSTALL_DOCLING: ${INSTALL_DOCLING:-1}
    depends_on:
      core:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      ldap-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment: &csai-env
      CSAI_HTTP_HOST: 0.0.0.0
      CSAI_HTTP_PORT: "8092"
      CSAI_CORS_ORIGINS: ${CSAI_CORS_ORIGINS:-}
      # Accept the bridge's bearer token (introspected at /v1/auth/introspect) so
      # the SPA's single login also authenticates chat/search here. REQUIRED for
      # the frontend — without it the SPA reuses its bridge token and CSAI rejects
      # it with "authentication required" (the /chat WebSocket closes 4401).
      CSAI_BRIDGE_URL: http://http-bridge:8090
      FILEENGINE_GRPC_HOST: core
      FILEENGINE_GRPC_PORT: "50051"
      FILEENGINE_CSAI_TENANT: ${DEFAULT_TENANT:-default}
      FILEENGINE_CSAI_USER: ${LDAP_ADMIN_EMAIL}
      FILEENGINE_CSAI_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      FILEENGINE_LDAP_ENDPOINT: ${LDAP_ENDPOINT}
      FILEENGINE_LDAP_DOMAIN: ${LDAP_DOMAIN}
      FILEENGINE_LDAP_BIND_DN: ${LDAP_BIND_DN}
      FILEENGINE_LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      FILEENGINE_LDAP_TENANT_BASE: ${LDAP_TENANT_BASE}
      FILEENGINE_LDAP_USER_BASE: ${LDAP_USER_BASE}
      CSAI_PG_HOST: postgres
      CSAI_PG_PORT: "5432"
      CSAI_PG_DATABASE: ${CSAI_DB}
      CSAI_PG_USER: ${POSTGRES_USER}
      CSAI_PG_PASSWORD: ${POSTGRES_PASSWORD}
      FILEENGINE_REDIS_HOST: redis
      FILEENGINE_REDIS_PORT: "6379"
      FILEENGINE_REDIS_PASSWORD: ${REDIS_PASSWORD}
      FILEENGINE_EVENTS_STREAM: ${EVENTS_STREAM:-fileengine:events}
      # AI providers (independent): embeddings on bundled CPU Ollama, chat external.
      CSAI_EMBEDDING_PROVIDER: ${CSAI_EMBEDDING_PROVIDER:-ollama}
      CSAI_EMBEDDING_MODEL: ${CSAI_EMBEDDING_MODEL:-nomic-embed-text}
      CSAI_EMBEDDING_BASE_URL: ${CSAI_EMBEDDING_BASE_URL:-http://ollama:11434/v1}
      CSAI_EMBEDDING_DIMENSION: ${CSAI_EMBEDDING_DIMENSION:-768}
      CSAI_CHAT_PROVIDER: ${CSAI_CHAT_PROVIDER:-anthropic}
      CSAI_CHAT_MODEL: ${CSAI_CHAT_MODEL:-claude-sonnet-4-6}
      CSAI_CHAT_BASE_URL: ${CSAI_CHAT_BASE_URL:-}
      CSAI_CHAT_API_KEY: ${CSAI_CHAT_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["convert-search-ai"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8092/healthz').status==200 else 1)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # CSAI worker — consumes file events from Redis, converts + indexes (renditions
  # + pgvector). Same image, different command.
  csai-worker:
    image: fileengine-csai:${VERSION:-1.1.0}
    depends_on:
      core:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      ldap-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      <<: *csai-env
    command: ["convert-search-ai-worker"]
    restart: unless-stopped

  # Model Context Protocol server (Streamable-HTTP) for AI agents. Reaches the
  # core over gRPC; per-request auth against LDAP; tenant from Host/X-Tenant.
  mcp:
    image: fileengine-mcp:${VERSION:-1.1.0}
    build:
      context: images/mcp
      dockerfile: Dockerfile
    depends_on:
      core:
        condition: service_healthy
      ldap-init:
        condition: service_completed_successfully
    environment:
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: "8089"
      FILEENGINE_GRPC_HOST: core
      FILEENGINE_GRPC_PORT: "50051"
      FILEENGINE_MCP_TENANT: ${DEFAULT_TENANT:-default}
      FILEENGINE_MCP_USER: ${LDAP_ADMIN_EMAIL}
      FILEENGINE_MCP_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      FILEENGINE_LDAP_ENDPOINT: ${LDAP_ENDPOINT}
      FILEENGINE_LDAP_DOMAIN: ${LDAP_DOMAIN}
      FILEENGINE_LDAP_BIND_DN: ${LDAP_BIND_DN}
      FILEENGINE_LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      FILEENGINE_LDAP_TENANT_BASE: ${LDAP_TENANT_BASE}
      FILEENGINE_LDAP_USER_BASE: ${LDAP_USER_BASE}
      MCP_READ_ONLY: ${MCP_READ_ONLY:-0}
      MCP_ALLOW_DELETE: ${MCP_ALLOW_DELETE:-0}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket,sys; socket.create_connection(('localhost',8089),3)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  # nginx — TLS termination, SPA serving, per-tenant subdomain routing. The ONLY
  # service that publishes host ports.
  nginx:
    image: fileengine-nginx:${VERSION:-1.1.0}
    build:
      context: images/nginx
      dockerfile: Dockerfile
    depends_on:
      http-bridge:
        condition: service_started
      csai-app:
        condition: service_started
      webdav-bridge:
        condition: service_started
      mcp:
        condition: service_started
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
      TLS_MODE: ${TLS_MODE:-selfsigned}
      HTTP_MAX_BODY_BYTES: ${HTTP_MAX_BODY_BYTES:-0}
      LE_EMAIL: ${LE_EMAIL:-}
      LE_STAGING: ${LE_STAGING:-false}
      LE_DNS_PROVIDER: ${LE_DNS_PROVIDER:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - nginxtls:/etc/nginx/tls
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  filecache:
  ldapdata:
  ollama:
  letsencrypt:
  nginxtls:
